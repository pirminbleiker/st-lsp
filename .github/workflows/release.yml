name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    # For workflow_run triggers, only proceed if CI passed
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run compile

      - name: Bundle server
        run: npm run bundle --workspace=server

      - name: Package VSIX
        run: cd client && node scripts/copy-server.js && npx vsce package --no-dependencies

      - name: Get version and SHA
        id: meta
        run: |
          echo "version=$(node -p "require('./client/package.json').version")" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Publish canary release
        if: github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete canary-build --yes --cleanup-tag 2>/dev/null || true
          gh release create canary-build client/*.vsix \
            --title "Canary Build (latest main)" \
            --notes "Automated canary build from $(git rev-parse --short HEAD)" \
            --prerelease

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" client/*.vsix \
            --title "Release ${{ steps.meta.outputs.version }}" \
            --generate-notes
